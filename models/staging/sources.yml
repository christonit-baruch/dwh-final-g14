version: 2

sources:
  - name: raw
    description: Raw data loaded from NYC Open Data
    database: christopher-santana-cis9440
    schema: nyc_311_street_complaint_motor_vehicle_crash_dataset
    tables:
      - name: 311_street_complaint_raw_data
        description: |
          NYC 311 street complaints and service requests.
          One row per service request.
        columns:
          - name: unique_key
            description: Unique ID for the service request
          - name: created_date
            description: Date and time the request was created
          - name: closed_date
            description: Date and time the request was closed
          - name: agency
            description: Agency code
          - name: agency_name
            description: Full name of the agency
          - name: complaint_type
            description: Type of complaint
          - name: descriptor
            description: Further description of the complaint
          - name: descriptor_2
            description: Additional description of the complaint
          - name: location_type
            description: Location where the incident occurred
          - name: incident_zip
            description: Zip code of the incident location
          - name: incident_address
            description: Street address of the incident
          - name: street_name
            description: Name of street where incident occurred
          - name: cross_street_1
            description: First cross street near incident location
          - name: cross_street_2
            description: Second cross street near incident location
          - name: intersection_street_1
            description: First street forming intersection where incident occurred
          - name: intersection_street_2
            description: Second street forming intersection where incident occurred
          - name: address_type
            description: 'Type of address (e.g., ADDRESS, INTERSECTION, BLOCKFACE)'
          - name: city
            description: City name where incident occurred
          - name: landmark
            description: Nearby landmark or point of interest
          - name: facility_type
            description: Type of facility where incident occurred
          - name: status
            description: 'Current status of request (Open, Closed, In Progress, etc.)'
          - name: due_date
            description: Expected due date for request resolution
          - name: resolution_description
            description: Description of how the request was resolved
          - name: resolution_action_updated_date
            description: Date when resolution action was last updated
          - name: community_board
            description: NYC Community Board district number
          - name: council_district
            description: NYC Council District number
          - name: police_precinct
            description: NYPD precinct number
          - name: bbl
            description: Borough Block and Lot number (NYC tax lot id)
          - name: borough
            description: NYC borough where incident occurred
          - name: x_coordinate_state_plane
            description: X coordinate in NY State Plane projection system
          - name: y_coordinate_state_plane
            description: Y coordinate in NY State Plane projection system
          - name: open_data_channel_type
            description: 'How request was submitted (ONLINE, PHONE, MOBILE, etc.)'
          - name: park_facility_name
            description: Name of park facility where incident occurred
          - name: park_borough
            description: Borough of park where incident occurred
          - name: vehicle_type
            description: Type of vehicle involved
          - name: taxi_company_borough
            description: Borough of the taxi company
          - name: taxi_pick_up_location
            description: Taxi pickup location
          - name: bridge_highway_name
            description: Name of bridge or highway where incident occurred
          - name: bridge_highway_direction
            description: Direction on bridge or highway (e.g. Northbound)
          - name: road_ramp
            description: Road ramp identifier where incident occurred
          - name: bridge_highway_segment
            description: Specific segment of bridge or highway
          - name: latitude
            description: Latitude coordinate
          - name: longitude
            description: Longitude coordinate

      - name: motor_vehicle_collisions_raw_data
        description: NYC Motor Vehicle Collisions data
        columns:
          - name: collision_id
            description: Unique record code generated by system
          - name: crash_date
            description: Occurrence date of collision
          - name: crash_time
            description: Occurrence time of collision
          - name: borough
            description: Borough where collision occurred
          - name: zip_code
            description: Postal code of incident occurrence
          - name: latitude
            description: Latitude coordinate for Global Coordinate System
          - name: longitude
            description: Longitude coordinate for Global Coordinate System
          - name: location
            description: Location coordinates
          - name: on_street_name
            description: Street on which the collision occurred
          - name: cross_street_name
            description: Nearest cross street to the collision
          - name: off_street_name
            description: Street address if known
          - name: number_of_persons_injured
            description: Number of persons injured
          - name: number_of_persons_killed
            description: Number of persons killed
          - name: number_of_pedestrians_injured
            description: Number of pedestrians injured
          - name: number_of_pedestrians_killed
            description: Number of pedestrians killed
          - name: number_of_cyclist_injured
            description: Number of cyclists injured
          - name: number_of_cyclist_killed
            description: Number of cyclists killed
          - name: number_of_motorist_injured
            description: Number of vehicle occupants injured
          - name: number_of_motorist_killed
            description: Number of vehicle occupants killed
          - name: contributing_factor_vehicle_1
            description: Factors contributing to the collision for designated vehicle
          - name: contributing_factor_vehicle_2
            description: Factors contributing to the collision for designated vehicle
          - name: contributing_factor_vehicle_3
            description: Factors contributing to the collision for designated vehicle
          - name: contributing_factor_vehicle_4
            description: Factors contributing to the collision for designated vehicle
          - name: contributing_factor_vehicle_5
            description: Factors contributing to the collision for designated vehicle
          - name: vehicle_type_code1
            description: Type of vehicle based on the selected vehicle category
          - name: vehicle_type_code2
            description: Type of vehicle based on the selected vehicle category
          - name: vehicle_type_code_3
            description: Type of vehicle based on the selected vehicle category
          - name: vehicle_type_code_4
            description: Type of vehicle based on the selected vehicle category
          - name: vehicle_type_code_5
            description: Type of vehicle based on the selected vehicle category