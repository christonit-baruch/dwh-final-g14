version: 2
sources:
  - name: raw
    description: Raw data loaded from NYC Open Data
    database: rojinacis9440project
    schema: nyc_311_raw_data 
    tables:
      - name: source_dot_service_requests_history
        description: |
          NYC 311 service requests for Dept of Transportation.
          One row per service request.
        columns:
          - name: unique_key
            description: Unique ID for the service request
            tests:
              - not_null
          - name: created_date
            description: Date and time the request was created
          - name: closed_date
            description: Date and time the request was closed
          - name: agency
            description: Agency code
          - name: agency_name
            description: Full name of the agency
          - name: complaint_type
            description: Type of complaint
          - name: descriptor
            description: Further description of the complaint
          - name: descriptor_2
            description: Additional description of the complaint
          - name: location_type
            description: Location where the incident occurred
          - name: incident_zip
            description: Zip code of the incident location
          - name: incident_address
            description: Street address of the incident
          - name: latitude
            description: Latitude coordinate
          - name: longitude
            description: Longitude coordinate
          - name: address_type
            description: 'Type of address (e.g., ADDRESS, INTERSECTION, BLOCKFACE)'
          - name: bbl
            description: Borough Block and Lot number (NYC tax lot id)
          - name: borough
            description: NYC borough where incident occurred
          - name: bridge_highway_direction
            description: Direction on bridge or highway (e.g. Northbound)
          - name: bridge_highway_name
            description: Name of bridge or highway where incident occurred
          - name: bridge_highway_segment
            description: Specific segment of bridge or highway
          - name: city
            description: City name where incident occurred
          - name: community_board
            description: NYC Community Board district number
          - name: cross_street_1
            description: First cross street near incident location
          - name: cross_street_2
            description: Second cross street near incident location
          - name: due_date
            description: Expected due date for request resolution
          - name: facility_type
            description: Type of facility where incident occurred
          - name: intersection_street_1
            description: First street forming intersection where incident occurred
          - name: intersection_street_2
            description: Second street forming intersection where incident occurred
          - name: open_data_channel_type
            description: How request was submitted (ONLINE, PHONE, MOBILE, etc.)
          - name: park_borough
            description: Borough of park where incident occurred
          - name: park_facility_name
            description: Name of park facility where incident occurred
          - name: resolution_action_updated_date
            description: Date when resolution action was last updated
          - name: resolution_description
            description: Description of how the request was resolved
          - name: road_ramp
            description: Road ramp identifier where incident occurred
          - name: status
            description: Current status of request (Open, Closed, In Progress, etc.)
          - name: street_name
            description: Name of street where incident occurred
          - name: x_coordinate_state_plane
            description: X coordinate in NY State Plane projection system (NAD 83)
          - name: y_coordinate_state_plane
            description: Y coordinate in NY State Plane projection system (NAD 83)
          - name: landmark
            description: Nearby landmark or point of interest

  
      - name: source_nyc_open_restaurant_apps_history
        description: |
          NYC Open Restaurant Outdoor Seating Applications.
          One row per restaurant application.
        columns:
          - name: objectid
            description: Autogenerated sequential number for each submission
            tests:
              - not_null
          - name: globalid
            description: Auto generated unique identifier
          - name: closed_date
            description: Date and time the request was closed
          - name: restaurant_name
            description: The name of the restaurant
          - name: legal_business_name
            description: The legal business name
          - name: doing_business_as_dba
            description: The Doing Business As (DBA) name for the restaurant
          - name: seating_interest_sidewalk
            description: The type of seating the applicant is interested in (Sidewalk/Roadway/Both)
          - name: building_number
            description: The street number for the restaurant building
          - name: street
            description: Name of the street the restaurant is on
          - name: borough
            description: The borough the restaurant is located in
          - name: zip
            description: Zip code of the building
          - name: business_address
            description: The full business address
          - name: food_service_establishment
            description: The permit number issued to the restaurant by DOHMH
          - name: sla_serial_number
            description: The unique identifying number issued by the SLA
          - name: sla_license_type
            description: The category of the alcohol license issued to the restaurant
          - name: qualify_alcohol
            description: Does this restaurant qualify to serve alcohol
          - name: sidewalk_dimensions_length
            description: The length of the sidewalk in feet
          - name: sidewalk_dimensions_width
            description: The width of the sidewalk from restaurant to the curb in feet
          - name: sidewalk_dimensions_area
            description: The total square footage of the sidewalk area in front of the restaurant
          - name: roadway_dimemsions_length
            description: The length of the roadway in feet
          - name: roadway_dimensions_width
            description: The width of the roadway in feet
          - name: roadway_dimensions_area
            description: The total square footage of the roadway area in front of the restaurant
          - name: approved_for_sidewalk_seating
            description: Is the restaurant approved for sidewalk seating
          - name: approved_for_roadway_seating
            description: Is the restaurant approved for roadway seating
          - name: landmark_district_or_building
            description: Is the building a landmark district or in a building
          - name: landmarkdistrict_terms
            description: Agreed to the terms and conditions of the landmark district
          - name: healthcompliance_terms
            description: Is the restaurant in compliance with the DOHMH
          - name: latitude
            description: Latitude of the building's location
          - name: park_borough
            description: Borough of park where incident occurred
          - name: longitude
            description: Longitude of the building's location
          - name: community_board
            description: The community board where the restaurant is located
          - name: council_district
            description: The Council District field indicates the New York City Council District
          - name: census_tract
            description: The Census Tract field indicates the U.S. Census Tract
          - name: bin
            description: The BIN (Building Identification Number) is a unique identifier
          - name: bbl
            description: The BBL (Borough, Block, Lot) is a unique identifier
          - name: nta
            description: The Neighborhood Tabulation Area field identifier
          - name: time_of_submission
            description: The date and time of the application submission
          - name: bulding_number
            description: Dynamically added by Socrata Ingester